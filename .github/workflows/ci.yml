name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: |
          pytest

      - name: Check import
        run: |
          python -c "import bias_core; print('OK:', bias_core.__version__)"

  extension-contract-gate:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Validate committed extension contract baseline
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path("extension-contract-baseline.json")
          payload = json.loads(path.read_text(encoding="utf-8"))
          snapshots = payload.get("contract_snapshots")
          if payload.get("schema_version") != 1 or not isinstance(snapshots, dict) or not snapshots:
              raise SystemExit("extension-contract-baseline.json is not a valid contract baseline")
          print(f"contract snapshots: {len(snapshots)}")
          PY

      - name: Run extension command contract tests
        env:
          DJANGO_SETTINGS_MODULE: tests.settings
          BIAS_EXTENSION_WORKSPACE_ROOT: ${{ github.workspace }}/..
          BIAS_FRONTEND_DIR: ${{ github.workspace }}/../bias/frontend
        run: |
          python -m django test tests.test_extension_commands tests.test_extension_boundary -v 2

      - name: Audit extension backend import boundaries
        env:
          DJANGO_SETTINGS_MODULE: tests.settings
          BIAS_EXTENSION_WORKSPACE_ROOT: ${{ github.workspace }}/..
          BIAS_FRONTEND_DIR: ${{ github.workspace }}/../bias/frontend
        run: |
          if [ -d "$BIAS_EXTENSION_WORKSPACE_ROOT/bias-ext-tags" ]; then
            python -m django inspect_extension_imports --extensions-path "$BIAS_EXTENSION_WORKSPACE_ROOT/extensions" --require-extensions
          else
            echo "Split extension workspace not present; backend import boundary audit is covered in workspace CI."
          fi

      - name: Audit extension test import boundaries
        env:
          DJANGO_SETTINGS_MODULE: tests.settings
          BIAS_EXTENSION_WORKSPACE_ROOT: ${{ github.workspace }}/..
          BIAS_FRONTEND_DIR: ${{ github.workspace }}/../bias/frontend
        run: |
          if [ -d "$BIAS_EXTENSION_WORKSPACE_ROOT/bias-ext-tags" ]; then
            python -m django inspect_extension_imports --extensions-path "$BIAS_EXTENSION_WORKSPACE_ROOT/extensions" --require-extensions --include-tests
          else
            echo "Split extension workspace not present; test import boundary audit is covered in workspace CI."
          fi

      - name: Audit extension wheel packages
        env:
          DJANGO_SETTINGS_MODULE: tests.settings
          BIAS_EXTENSION_WORKSPACE_ROOT: ${{ github.workspace }}/..
          BIAS_FRONTEND_DIR: ${{ github.workspace }}/../bias/frontend
        run: |
          if [ -d "$BIAS_EXTENSION_WORKSPACE_ROOT/bias-ext-tags" ]; then
            python -m django inspect_extension_packages --extensions-path "$BIAS_EXTENSION_WORKSPACE_ROOT/extensions" --require-extensions --build --install-smoke --install-set-smoke --migration-smoke
          else
            echo "Split extension workspace not present; wheel package audit is covered in workspace CI."
          fi

      - name: Run full release gate when workspace extensions are present
        env:
          DJANGO_SETTINGS_MODULE: tests.settings
          BIAS_EXTENSION_WORKSPACE_ROOT: ${{ github.workspace }}/..
          BIAS_FRONTEND_DIR: ${{ github.workspace }}/../bias/frontend
        run: |
          if [ -d "$BIAS_EXTENSION_WORKSPACE_ROOT/bias-ext-tags" ] && [ -f "$BIAS_FRONTEND_DIR/package.json" ]; then
            (cd "$BIAS_FRONTEND_DIR" && npm ci && npm run check:platform)
            python -m django prepare_release --set-version "$(cat VERSION)" --dry-run --allow-dirty
          else
            echo "Split extension workspace not present; full prepare_release gate is covered in workspace CI."
          fi

  build:
    runs-on: ubuntu-latest
    needs: [test, extension-contract-gate]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
